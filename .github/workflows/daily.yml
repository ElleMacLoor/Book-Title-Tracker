name: Daily Amazon Rank Scrape

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape ranks
        run: node scripts/scrape.js

      - name: Commit updated ranks
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/ranks.json
          git commit -m "Update Amazon ranks" || echo "No changes"
          git push
